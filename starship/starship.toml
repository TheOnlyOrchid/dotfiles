# Starship prompt вҖ” KawaiiShell рҹҺҖ
# Needy streamer overload: pink badges, hearts, ribbon separators

format = """
[](fg:#3D2248)\
$directory\
[](bg:#5A2D5C fg:#3D2248)\
$git_branch\
$git_status\
[](bg:#7B3775 fg:#5A2D5C)\
$python$nodejs$rust$golang$package\
[](fg:#7B3775)\
$fill\
$cmd_duration\
$battery\
$time\
$line_break\
$character"""

[directory]
style = "bold fg:#FFE8F5 bg:#3D2248"
format = "[ вҷЎ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "рҹ“„ docs"
"Downloads" = "рҹ“Ҙ dl"
"Music" = "рҹҺө music"
"Pictures" = "рҹ–јпёҸ pics"
"Desktop" = "рҹ–ҘпёҸ desk"

[git_branch]
symbol = " "
style = "bold fg:#FFB3D9 bg:#5A2D5C"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:#FF6EB4 bg:#5A2D5C"
format = '([$all_status$ahead_behind ]($style))'
conflicted = "вҡЎ"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "вҷЎ "
stashed = "рҹ“Ұ"
modified = "вңҺ "
staged = "[++$count](fg:#FFB3D9 bg:#5A2D5C)"
renamed = "вһң "
deleted = "вңҳ "

[character]
success_symbol = "[вқҜ](bold fg:#FF6EB4)"
error_symbol = "[вқҜ](bold fg:#FF4D6D)"
vimcmd_symbol = "[вқ®](bold fg:#FFB3D9)"

[fill]
symbol = " "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:#C090B0"
format = "[ вҷЎ $time ]($style)"

[cmd_duration]
min_time = 2000
style = "fg:#D084C0"
format = "[ вҸұ $duration]($style) "

[python]
symbol = "рҹҗҚ"
style = "fg:#FFB3D9 bg:#7B3775"
format = "[ ${symbol} ${version} ]($style)"

[nodejs]
symbol = "в¬ў"
style = "fg:#FF6EB4 bg:#7B3775"
format = "[ $symbol $version ]($style)"

[rust]
symbol = "рҹҰҖ"
style = "fg:#FFB347 bg:#7B3775"
format = "[ $symbol $version ]($style)"

[golang]
symbol = "рҹҗ№"
style = "fg:#FFB3D9 bg:#7B3775"
format = "[ $symbol $version ]($style)"

[package]
symbol = "рҹ“Ұ"
style = "fg:#D084C0 bg:#7B3775"
format = "[ $symbol $version ]($style)"

[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "вҡЎ"
discharging_symbol = "рҹ”Ӣ"
unknown_symbol = "вқ“"
empty_symbol = "рҹ’Җ"
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 50
style = "fg:#FFB347"

[[battery.display]]
threshold = 20
style = "bold fg:#FF4D6D"

[username]
show_always = false
style_user = "fg:#FF6EB4 bold"
style_root = "fg:#FF4D6D bold"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "fg:#FFB3D9 bold"
format = "[@$hostname]($style) "
