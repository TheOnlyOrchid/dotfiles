# ╔══════════════════════════════════════════════════╗
# ║         🌿 Sprigatito Terminal — kitty.conf       ║
# ╚══════════════════════════════════════════════════╝

# ── Font ─────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# ── Cursor ───────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ───────────────────────────────────────
scrollback_lines 10000

# ── Mouse ────────────────────────────────────────────
mouse_hide_wait 3.0

# ── Tabs ─────────────────────────────────────────────
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_min_tabs       1
active_tab_font_style  bold

# ── Window ───────────────────────────────────────────
window_padding_width     10
placement_strategy       center
confirm_os_window_close  0

# ── Background opacity (subtle — laptop-friendly) ────
background_opacity 0.95
dynamic_background_opacity yes

# ── Colour scheme: Sprigatito ─────────────────────────
background            #1E1E2E
foreground            #F5F3E7
selection_background  #7BC96F
selection_foreground  #1E1E2E

cursor                #7BC96F
cursor_text_color     #1E1E2E

color0   #1E1E2E
color1   #E06C75
color2   #7BC96F
color3   #C8A96E
color4   #A8E6CF
color5   #8B5E3C
color6   #A8E6CF
color7   #F5F3E7
color8   #3a3a52
color9   #E88288
color10  #98DD8C
color11  #D4B882
color12  #BEF0DB
color13  #A3714A
color14  #BDEEDD
color15  #FFFFFF

active_tab_background   #7BC96F
active_tab_foreground   #1E1E2E
inactive_tab_background #2a2a3e
inactive_tab_foreground #9090a8
tab_bar_background      #1E1E2E

url_color #A8E6CF
url_style curly

# ── Shell integration ────────────────────────────────
shell_integration enabled

# ── Startup ──────────────────────────────────────────
startup_session ~/.config/kitty/startup.session
